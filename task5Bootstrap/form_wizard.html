<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Form Wizard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <h2 class="mb-4">User Registration Wizard</h2>

        <div id="alert-area"></div>

        <div class="progress mb-4">
	        <div id="wizardProgress" class="progress-bar" style="width: 33%"></div>
        </div>

        <div id="wizard">
            
            <ul class="nav nav-tabs mb-4" id="wizardTabs">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#step1" type="button">Step 1</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#step2" type="button">Step 2</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#step3" type="button">Step 3</button>
                </li>
            </ul>

            <div class="tab-content">
                
                <div class="tab-pane fade show active" id="step1">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title mb-4">Personal Information</h5>
                            <div class="mb-3">
                                <input type="text" class="form-control" id="name" placeholder="Full Name">
                            </div>
                            <div class="mb-3">
                                <input type="email" class="form-control" id="email" placeholder="Email">
                            </div>
                            <button type="button" class="btn btn-primary" onclick="handleStep1Next()">Next</button>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="step2">
                    <div class="card">
                        <div class="card-body">
                            <h4 class="card-title mb-4">Account Details</h4>
                            <div class="mb-3">
                                <input type="text" class="form-control" id="usernameInput" placeholder="Username">
                            </div>
                            <div class="mb-4">
                                <input type="password" class="form-control" id="passwordInput" placeholder="Password">
                            </div>
                            <div class="d-flex gap-2">
                                <button type="button" class="btn btn-secondary" onclick="previousStep(1)">Back</button>
                                <button type="button" class="btn btn-primary" onclick="nextStep(3)">Next</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="step3">
                    <div class="card">
                        <div class="card-body">
                            <h4 class="card-title mb-3">Confirmation</h4>
                            <p class="card-text mb-4">Please confirm your information.</p>
                            <div class="d-flex gap-2">
                                <button type="button" class="btn btn-secondary" onclick="previousStep(2)">Back</button>
                                <button type="button" class="btn btn-success" onclick="submitForm()">Submit</button>
                            </div>
                        </div>
                    </div>
                </div>

            </div> </div> </div> <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/wizard.js"></script>

</body>
</html>
